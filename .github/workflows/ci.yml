name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  IMAGE_TAG: runner-images-minimal:ci

jobs:
  lint:
    name: Lint (shellcheck + hadolint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck (make lint)
        run: make lint

      - name: Run hadolint on the Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: images/ubuntu/Dockerfile
          config: .hadolint.yaml

  unit-tests:
    name: Unit tests (bats)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run bats suite (make test)
        run: make test

  build-and-validate:
    name: Build image and validate
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: images/ubuntu
          file: images/ubuntu/Dockerfile
          tags: ${{ env.IMAGE_TAG }}
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate image
        run: tests/validate-image.sh "${IMAGE_TAG}"
