name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint (shellcheck + hadolint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck (make lint)
        run: make lint

      - name: Run hadolint on the ubuntu Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: images/ubuntu/Dockerfile
          config: .hadolint.yaml

      - name: Run hadolint on the ubi9 Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: images/ubi9/Dockerfile
          config: .hadolint.yaml

  unit-tests:
    name: Unit tests (bats)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run bats suite (make test)
        run: make test

  build-and-validate:
    name: Build image and validate (${{ matrix.distro }})
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    strategy:
      fail-fast: false
      matrix:
        distro: [ubuntu, ubi9]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: images
          file: images/${{ matrix.distro }}/Dockerfile
          tags: runner-images-minimal:${{ matrix.distro }}
          load: true
          push: false
          cache-from: type=gha,scope=${{ matrix.distro }}
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}

      - name: Validate image
        run: tests/validate-image.sh "runner-images-minimal:${{ matrix.distro }}"

  build-and-validate-flavor:
    name: Build terraform flavor and validate
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the ubuntu base first (same as the ubuntu matrix leg), reusing the
      # ubuntu cache scope so this shares CI's layer cache.
      - name: Build ubuntu base image
        uses: docker/build-push-action@v6
        with:
          context: images
          file: images/ubuntu/Dockerfile
          tags: runner-images-minimal:ubuntu
          load: true
          push: false
          cache-from: type=gha,scope=ubuntu
          cache-to: type=gha,mode=max,scope=ubuntu

      # Layer the terraform flavor on the just-built base.
      - name: Build terraform flavor image
        uses: docker/build-push-action@v6
        with:
          context: images
          file: images/flavors/terraform/Dockerfile
          build-args: |
            BASE_IMAGE=runner-images-minimal:ubuntu
          tags: runner-images-minimal:terraform
          load: true
          push: false
          cache-from: type=gha,scope=terraform
          cache-to: type=gha,mode=max,scope=terraform

      - name: Validate terraform flavor image
        run: tests/validate-flavor-terraform.sh "runner-images-minimal:terraform"
