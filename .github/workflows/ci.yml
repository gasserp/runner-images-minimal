name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint (shellcheck + hadolint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck (make lint)
        run: make lint

      - name: Run hadolint on the ubuntu Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: images/ubuntu/Dockerfile
          config: .hadolint.yaml

      - name: Run hadolint on the ubi9 Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: images/ubi9/Dockerfile
          config: .hadolint.yaml

  unit-tests:
    name: Unit tests (bats)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run bats suite (make test)
        run: make test

  build-and-validate:
    name: Build image and validate (${{ matrix.distro }})
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    strategy:
      fail-fast: false
      matrix:
        distro: [ubuntu, ubi9]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: images
          file: images/${{ matrix.distro }}/Dockerfile
          tags: runner-images-minimal:${{ matrix.distro }}
          load: true
          push: false
          cache-from: type=gha,scope=${{ matrix.distro }}
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}

      - name: Validate image
        run: tests/validate-image.sh "runner-images-minimal:${{ matrix.distro }}"

  build-and-validate-flavor:
    name: Build flavor and validate (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    strategy:
      fail-fast: false
      matrix:
        flavor: [terraform, node, python, java, dotnet, go, rust, ruby, php, dart]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the ubuntu base first (same as the ubuntu matrix leg), reusing the
      # ubuntu cache scope so this shares CI's layer cache.
      - name: Build ubuntu base image
        uses: docker/build-push-action@v6
        with:
          context: images
          file: images/ubuntu/Dockerfile
          tags: runner-images-minimal:ubuntu
          load: true
          push: false
          cache-from: type=gha,scope=ubuntu
          # cache-from only: the matrix jobs would race writing the same scope.

      # Layer the flavor on the just-built base with a plain `docker build`:
      # the buildx docker-container driver used by build-push-action is an
      # isolated BuildKit instance that cannot see engine-local images, so FROM
      # runner-images-minimal:ubuntu (loaded by the previous step) only resolves
      # via the engine's own builder.
      - name: Build flavor image
        run: |
          docker build \
            --build-arg BASE_IMAGE=runner-images-minimal:ubuntu \
            -t "runner-images-minimal:${{ matrix.flavor }}" \
            -f "images/flavors/${{ matrix.flavor }}/Dockerfile" \
            images

      - name: Validate flavor image
        run: tests/validate-flavor.sh "${{ matrix.flavor }}" "runner-images-minimal:${{ matrix.flavor }}"
