name: Self-hosted smoke test

# Temporary, manual-only workflow to verify each flavor's self-hosted runner
# actually picks up and completes a real job using its baked-in tooling.
# Not part of the regular CI/release pipeline.
on:
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke test (${{ matrix.flavor }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: terraform
            command: terraform version
          - flavor: node
            command: node -e "console.log('node ok', process.version)"
          - flavor: python
            command: python3 -c "import sys; print('python ok', sys.version)"
          - flavor: java
            command: mvn -v
          - flavor: dotnet
            command: dotnet --list-sdks
          - flavor: go
            command: go version
          - flavor: rust
            command: rustc --version && cargo --version
          - flavor: ruby
            command: ruby --version && gem --version
          - flavor: php
            command: php --version && composer --version
          - flavor: dart
            command: dart --version
    runs-on: [self-hosted, "${{ matrix.flavor }}"]
    steps:
      - name: Run flavor tool
        run: ${{ matrix.command }}
