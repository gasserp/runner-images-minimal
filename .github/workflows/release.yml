name: Release

# Builds and publishes runner images whenever actions/runner ships a new
# release. Runs on a schedule (autodetecting the latest upstream version) and
# can be triggered manually with an optional explicit version override.
on:
  schedule:
    # Every 6 hours at minute 23 (off-peak) — UTC.
    - cron: '23 */6 * * *'
  workflow_dispatch:
    inputs:
      runner_version:
        description: 'actions/runner version to build (empty = autodetect latest)'
        required: false
        type: string

# Serialize runs so two overlapping schedules cannot both see a version as
# "new" and race to publish it.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check:
    name: Detect target runner version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.detect.outputs.version }}
      is_new: ${{ steps.detect.outputs.is_new }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect target version and whether it is new
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.runner_version }}
        run: |
          set -euo pipefail

          # Pick the target version: explicit workflow_dispatch input wins,
          # otherwise autodetect the latest actions/runner release.
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION#v}"
            echo "Using workflow_dispatch input version: ${VERSION}"
          else
            VERSION="$(gh api repos/actions/runner/releases/latest --jq .tag_name)"
            VERSION="${VERSION#v}"
            echo "Autodetected latest actions/runner version: ${VERSION}"
          fi

          if [ -z "${VERSION}" ]; then
            echo "::error::could not determine the target runner version"
            exit 1
          fi

          # Determine whether a release tag v<version> already exists in THIS
          # repo. git ls-remote --exit-code returns non-zero when there is no
          # matching ref; used as an `if` condition it does not trip `set -e`.
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            IS_NEW=false
            echo "Tag v${VERSION} already exists in this repo; nothing to do."
          else
            IS_NEW=true
            echo "Tag v${VERSION} does not exist yet; will build and release."
          fi

          {
            echo "version=${VERSION}"
            echo "is_new=${IS_NEW}"
          } >> "${GITHUB_OUTPUT}"

  build-push:
    name: Build, validate and push (${{ matrix.distro }})
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.is_new == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        distro: [ubuntu, ubi9]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and load locally (amd64 only, same as CI). Sharing the CI cache
      # scope (scope=<distro>) lets these builds reuse CI's layer cache.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: images
          file: images/${{ matrix.distro }}/Dockerfile
          build-args: |
            RUNNER_VERSION=${{ needs.check.outputs.version }}
          tags: runner-images-minimal:${{ matrix.distro }}
          load: true
          push: false
          cache-from: type=gha,scope=${{ matrix.distro }}
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}

      - name: Validate image
        env:
          EXPECTED_RUNNER_VERSION: ${{ needs.check.outputs.version }}
        run: tests/validate-image.sh "runner-images-minimal:${{ matrix.distro }}"

      # Only reached when validation passed. Tag the already-built, already-
      # loaded image and push both the version and latest tags to GHCR.
      - name: Tag and push to GHCR
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository }}/${{ matrix.distro }}"
          docker tag "runner-images-minimal:${{ matrix.distro }}" "${IMAGE}:${VERSION}"
          docker tag "runner-images-minimal:${{ matrix.distro }}" "${IMAGE}:latest"
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check, build-push]
    if: needs.check.outputs.is_new == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"

          # Tolerate the race where a concurrent run already published the tag.
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; nothing to do."
            exit 0
          fi

          IMAGE_BASE="ghcr.io/${{ github.repository }}"
          {
            echo "Built from [actions/runner ${TAG}](https://github.com/actions/runner/releases/tag/${TAG})."
            echo
            echo "Container images pushed to GHCR (amd64 only):"
            echo
            echo "- \`${IMAGE_BASE}/ubuntu:${VERSION}\` (also \`${IMAGE_BASE}/ubuntu:latest\`)"
            echo "- \`${IMAGE_BASE}/ubi9:${VERSION}\` (also \`${IMAGE_BASE}/ubi9:latest\`)"
          } > release-notes.md

          # gh release create creates the tag (at the current commit) and the
          # release in one step.
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file release-notes.md
